name: Docs site tests

# Runs Playwright on every PR touching the docs site, plus on manual dispatch.
#
# Also uploads the built `out/` directory as an artifact so reviewers can
# download it and serve a LOCAL PREVIEW:
#
#   1. Click the workflow run → scroll to "Artifacts" → download "docs-site-out"
#   2. unzip docs-site-out.zip -d preview
#   3. npx serve preview --listen 4173
#   4. open http://localhost:4173/shinyblocks/
#
# This is the v1 preview workflow because GH Pages on a private repo needs
# GitHub Pro/Team. Switch to PR-preview deploys once the repo is public.

on:
  pull_request:
    paths:
      - "docs-site/**"
      - "NEWS.md"
      - "inst/www/**"
      - ".github/workflows/docs-tests.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::htmltools
          working-directory: .

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium webkit

      - run: npm run build

      - name: Upload static export for local preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-out
          path: docs-site/out
          retention-days: 14

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: docs-site/playwright-report/
          retention-days: 14
