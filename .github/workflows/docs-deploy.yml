name: Deploy docs site

# WHEN THIS RUNS:
#   - On push to main, if docs-site/, NEWS.md, or inst/www/ changed
#   - On manual dispatch
#
# REQUIRED REPO SETTING (one-time, in GitHub UI):
#   Settings → Pages → Source = "GitHub Actions"
#
# NOTE: GitHub Pages on a PRIVATE repo requires GitHub Pro/Team/Enterprise.
# On a free private repo this workflow runs and builds, but the deploy step
# will fail until the repo is made public OR Pages is enabled.
#
# Live URL once Pages is enabled:
#   https://nvelden.github.io/shinyblocks/

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "R/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "NEWS.md"
      - "inst/www/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # R is needed by `Rscript scripts/generate-previews.R` (Phase 2+).
      # Until that script lands the prebuild is a no-op, but the action is
      # cheap so we keep it warm.
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::htmltools
            any::shinylive
            local::.
          working-directory: "."
          install-quarto: false

      # `webr` is the R interface used inside the webR runtime. Installed
      # locally only so `shinylive::export()`'s static analysis of each
      # app.R can resolve `webr::mount(...)`. It is published via
      # r-wasm's r-universe.
      - name: Install webr (build-time dep for shinylive::export)
        working-directory: docs-site
        run: |
          Rscript -e 'install.packages("webr",
            repos = c("https://r-wasm.r-universe.dev", getOption("repos")))'

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - run: npm ci
        working-directory: docs-site

      # Build the wasm filesystem image (library.data.gz +
      # library.js.metadata) from the checked-out package commit. The
      # playground R source and the browser-loaded shinyblocks package must
      # stay in lockstep; otherwise new component arguments can be exported
      # before webR has a package image that supports them.
      - name: Checkout r-wasm/actions
        uses: actions/checkout@v6
        with:
          ref: v3
          repository: r-wasm/actions
          token: ${{ secrets.GITHUB_TOKEN }}
          path: .r-wasm-actions

      - name: Find Config/Needs/wasm in DESCRIPTION
        id: wasm-needs
        shell: Rscript {0}
        run: |
          has_wasm_need <-
            file.exists("DESCRIPTION") &&
            "Config/Needs/wasm" %in% names(as.list(read.dcf("DESCRIPTION")[1,]))
          pkg <- if (has_wasm_need) as.list(read.dcf("DESCRIPTION")[1,])$`Config/Needs/wasm` else ""
          pkg <- paste0(strsplit(pkg, "[[:space:],]+")[[1]], collapse = ",")
          cat("pkg=", pkg, "\n", file = Sys.getenv("GITHUB_OUTPUT"), sep = "", append = TRUE)

      - name: Build wasm filesystem image from this commit
        uses: ./.r-wasm-actions/build-rwasm
        with:
          packages: |
            .
            ${{ steps.wasm-needs.outputs.pkg }}
          strip: "demo, doc, examples, help, html, include, tests, vignette"
          image-path: docs-site/playgrounds/_wasm
          compress: true

      # 1. Static previews + initial manifest.
      # 2. Shinylive exports + merge hasPlayground into the manifest.
      # 3. Next build consumes the merged manifest + exported assets.
      - run: npm run prebuild
        working-directory: docs-site
      - run: Rscript scripts/generate-playgrounds.R
        working-directory: docs-site
      - run: npx next build
        working-directory: docs-site

      # GitHub Pages would otherwise run Jekyll over `out/` and discard
      # the `_next/` folder.
      - run: touch out/.nojekyll
        working-directory: docs-site

      # `enablement: true` lets the action turn on Pages (source = GitHub
      # Actions) on first run so the deploy does not 404 on a fresh repo.
      # On a free private repo this still fails until the repo is made
      # public or Pages is otherwise available — see the note above.
      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
