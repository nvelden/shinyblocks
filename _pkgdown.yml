destination: site/pkgdown
url: https://nvelden.github.io/shinyblocks/

template:
  bootstrap: 5

# The component gallery (vignettes/articles/components/) is on hold
# pending the WASM resolution called out in ADR 0013. When it lands,
# reinstate the navbar Components entry and the `articles:` block
# (see git blame for the previous shape) so pkgdown surfaces every
# .qmd page. Until then, articles auto-discover via pkgdown defaults
# and the showcase is the visual verification surface.

reference:
  - title: Layout
    contents:
      - block_page
      - block_body
      - block_header
      - block_sidebar
  - title: Navigation
    contents:
      - block_nav
      - block_nav_item
      - block_tabs
      - block_tab
  - title: Content
    contents:
      - block_card
      - block_card_header
      - block_card_title
      - block_card_description
      - block_card_content
      - block_card_footer
      - block_value_box
      - block_badge
      - block_alert
      - block_alert_title
      - block_alert_description
      - block_separator
      - block_skeleton
      - block_spinner
      - block_empty
      - block_dialog
      - update_block_dialog
      - block_popover
  - title: Forms
    contents:
      - block_field_group
      - block_field
      - block_field_label
      - block_field_description
      - block_field_set
      - block_field_legend
      - block_field_invalid
      - block_input_group
      - block_input_group_addon
      - block_select
      - update_block_select
      - block_textarea
      - update_block_textarea
      - block_input
      - update_block_input
      - block_checkbox
      - block_switch
      - block_slider
  - title: Theme
    contents:
      - block_theme
      - block_dark_mode_toggle
      - update_block_theme
  - title: Action
    contents:
      - block_button
  - title: Icon
    contents:
      - block_icon
  - title: Showcase
    contents:
      - run_showcase

# Planned v0.1 reference sections added as components land:
# Forms, Theme.
