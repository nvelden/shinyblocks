destination: site/pkgdown

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, components, reference, articles, news]
    right: [search, github]
  components:
    components:
      text: Components
      href: articles/components.html

articles:
  - title: Components
    desc: >
      Live demos of every exported component, modelled on
      <https://shiny.posit.co/r/components/>. See ADR 0013.
    navbar: ~
    contents:
      - components
      - components/button
  # New component pages join this list as they land.

reference:
  - title: Layout
    contents:
      - block_page
      - block_body
      - block_header
      - block_sidebar
  - title: Navigation
    contents:
      - block_nav_item
  - title: Content
    contents:
      - block_card
      - block_badge
      - block_alert
      - block_alert_title
      - block_alert_description
  - title: Action
    contents:
      - block_button
  - title: Icon
    contents:
      - block_icon
  - title: Showcase
    contents:
      - run_showcase

